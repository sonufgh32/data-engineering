name: Test Project

on: [push]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
        - name: Get the code
          uses: actions/checkout@v3
        
        - name: Install NodeJS
          uses: actions/setup-node@v3
          with:
            node-version: '18'

        - name: Install dependencies
          run:
            cd frontend/github-actions-first
            npm install

        - name: Run tests
          run: |
            cd frontend/github-actions-first
            npm test
        
