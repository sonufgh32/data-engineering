name: GitHub Actions - example
run-name: First GitHub Actions Workflow

# Workflow = Entire automation process
# Job = A group of tasks inside the workflow
# Step = Individual command/action executed inside a job

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  first-job:
    runs-on: ubuntu-latest
    steps:
      - name: Print Greeting
        run: echo "Hello, World!"
      
      - name: List Files
        run: ls -la
      
      - name: Print GitHub Context
        run: |
          echo "Repository: ${{ github.repository }}"
      
      - name: Print Event Name
        run: |
          echo "Event Name: ${{ github.event_name }}"

      - name: Print Actor
        run: |
          echo "Actor: ${{ github.actor }}"
      
      - name: Print Workflow
        run: |
          echo "Workflow: ${{ github.workflow }}"

      # Print all the GitHub object
      - name: Print GitHub Context Object
        run: |
          echo "GitHub Context: ${{ toJson(github) }}"
        
      - name: Print GitHub event object
        run: |
          echo "GitHub: ${{ github.event }}"