AWSTemplateFormatVersion: "2010-09-09"
Description: AWS CloudFormation which creates the resources for the aws iceberg glue tutorial 

Parameters:
  S3PySparkBucketName:
    Type: String
    Description: Bucket name for the aws tutorial
Resources:
  S3BucketForData:
    Type: AWS::S3::Bucket
    Properties: 
      BucketName: !Sub '${S3PySparkBucketName}-${AWS::AccountId}'
      Tags:
      - Key: BucketName
        Value: !Sub '${S3PySparkBucketName}-${AWS::AccountId}'

  GlueDatabase:
    Type: AWS::Glue::Database
    Properties: 
      CatalogId: !Ref AWS::AccountId
      DatabaseInput: 
        Name: !Sub 'iceberg-db-${AWS::AccountId}'
        Description: "This database contains the tables for the iceberg tutorial"

  AthenaWorkGroupIceberg:
    DependsOn: 
    - GlueDatabase
    - S3BucketForData
    Type: AWS::Athena::WorkGroup
    Properties:
          Name: AthenaWorkGroupIceberg
          Description: The workgroup for Iceberg AWS tutorial
          State: ENABLED
          WorkGroupConfiguration:
            ResultConfiguration:
              OutputLocation: !Sub s3://${S3PySparkBucketName}-${AWS::AccountId}/athena_results   

Outputs:
  S3Bucket:
    Value: !Ref S3BucketForData