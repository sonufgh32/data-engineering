version: "3.8"

services:
  grafana:
    build:
      context: ./grafana
      dockerfile: Dockerfile
    container_name: grafana
    user: "0"
    ports:
      - "3000:3000"
      - "3100:3100"
      - "3200:3200"
    env_file:
      - ./env/grafana.env
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/loki-local-config.yaml:/etc/loki/local-config.yaml
      - ./grafana/config.alloy:/etc/alloy/config.alloy
    networks:
      - data-engineering

  prometheus:
    depends_on:
      - grafana
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/etc/prometheus
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      # mount local config file if you have one
      # - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - data-engineering

  alertmanager:
    depends_on:
      - grafana
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    networks:
      - data-engineering

  pyspark:
    depends_on:
      - alertmanager
      - prometheus
      - grafana
    build:
      context: ./pyspark
      dockerfile: Dockerfile
    container_name: pyspark
    ports:
      - "8888:8888"     # Jupyter Lab
      - "4040:4040"     # Spark UI
      - "18080:18080"   # Spark History Server (optional)

    volumes:
      - ./scripts:/workspace
      - C:\Users\sonuf\.aws:/root/.aws

    environment:
      - SPARK_LOG_LEVEL=DEBUG
      - AWS_DEFAULT_REGION=ap-south-1
      - PYSPARK_PYTHON=/env/bin/python
    
    networks:
      - data-engineering

    working_dir: /workspace

    stdin_open: true
    tty: true

  postgres:
    depends_on:
      - pyspark
    image: postgres:15
    container_name: sonarqube_db
    restart: always
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      - postgres_data:/var/lib/postgresql/data

  sonarqube:
    depends_on:
      - postgres
    image: sonarqube:community
    container_name: sonarqube
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions

networks:
  data-engineering:
    driver: bridge

volumes:
  grafana_data:
  prometheus_data:
  postgres_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions: